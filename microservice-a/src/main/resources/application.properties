quarkus.http.port=8080

quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:5173
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Content-Type,Accept,Authorization
quarkus.http.cors.exposed-headers=Location
quarkus.http.cors.access-control-max-age=24H

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:credito}
quarkus.datasource.password=${DB_PASSWORD:credito123}
quarkus.datasource.reactive.url=postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:creditodb}

quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

quarkus.grpc.clients.risk-service.host=${RISK_SERVICE_HOST:localhost}
quarkus.grpc.clients.risk-service.port=${RISK_SERVICE_PORT:9000}
quarkus.grpc.clients.risk-service.plain-text=true

quarkus.grpc.server.port=9001

quarkus.jackson.write-dates-as-timestamps=false

quarkus.log.level=INFO
quarkus.log.category."com.credito".level=INFO
